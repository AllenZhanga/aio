server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: aio
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aio}}
    username: ${DB_USER:aio}
    password: ${DB_PASSWORD:}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

aio:
  app-mode: ${APP_MODE:private}
  deployment-profile: ${DEPLOYMENT_PROFILE:embedded}
  default-tenant-id: ${DEFAULT_TENANT_ID:default}
  multi-tenant-enabled: ${ENABLE_MULTI_TENANT:false}
  stdio-mcp-enabled: ${ENABLE_STDIO_MCP:false}
  code-node-enabled: ${ENABLE_CODE_NODE:false}
  secret-key: ${AIO_SECRET_KEY:dev-only-change-me}
  console-username: ${AIO_CONSOLE_USERNAME:admin}
  console-password: ${AIO_CONSOLE_PASSWORD:admin}
  console-accounts: ${AIO_CONSOLE_ACCOUNTS:}
  console-session-ttl-seconds: ${AIO_CONSOLE_SESSION_TTL_SECONDS:28800}
