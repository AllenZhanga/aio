server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: aio

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

aio:
  app-mode: ${APP_MODE:private}
  deployment-profile: ${DEPLOYMENT_PROFILE:embedded}
  default-tenant-id: ${DEFAULT_TENANT_ID:default}
  multi-tenant-enabled: ${ENABLE_MULTI_TENANT:false}
  stdio-mcp-enabled: ${ENABLE_STDIO_MCP:false}
  code-node-enabled: ${ENABLE_CODE_NODE:false}
